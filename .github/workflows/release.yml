name: Release

# Publish a release with `gh release create vX.Y.Z --generate-notes` (versions
# already committed). The workflow_dispatch path rebuilds an existing release's
# binaries without re-publishing crates.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries for (e.g. v0.8.0)"
        required: true

jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: gpg-inspector
      tag: ${{ github.event.inputs.tag }}
      publish-crates: true
      crates: "gpg-inspector-lib gpg-inspector"
      targets: |
        [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","asset":"gpg-inspector-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-gnu","asset":"gpg-inspector-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"gpg-inspector-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"gpg-inspector-macos-aarch64.tar.gz"},
          {"os":"windows-latest","target":"x86_64-pc-windows-msvc","asset":"gpg-inspector-windows-x86_64.zip"}
        ]
    secrets: inherit
