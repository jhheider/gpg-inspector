name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries + refresh formula"
        required: true
permissions:
  contents: write
jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: gpg-inspector
      tag: ${{ github.event.inputs.tag }}
      publish-crates: true
      crates: "gpg-inspector-lib gpg-inspector"
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/gpg-inspector.rb
      targets: |
        {"include": [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","asset":"gpg-inspector-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"gpg-inspector-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"gpg-inspector-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"gpg-inspector-macos-aarch64.tar.gz"},
          {"os":"windows-latest","target":"x86_64-pc-windows-msvc","asset":"gpg-inspector-windows-x86_64.zip"}
        ]}
    secrets: inherit
