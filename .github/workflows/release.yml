name: Release

# Fires when a GitHub Release is published. The full release ceremony:
#   gh release create vX.Y.Z --generate-notes
# (version must already be committed in Cargo.toml) — this builds the
# platform binaries, attaches them, and publishes both crates.
on:
  release:
    types: [published]
  # Manual trigger to (re)build binaries and refresh the tap formula for an
  # existing release. Builds from the tag's own code; the crates publish is
  # skipped on dispatch (binaries + formula only).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach binaries to (e.g. v0.8.0)"
        required: true

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: gpg-inspector-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: gpg-inspector-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: gpg-inspector-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: gpg-inspector-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: gpg-inspector-windows-x86_64.zip
    steps:
      # Build the tag's own code (matters on dispatch), so attached binaries
      # match the released source.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Installs the cross linker for the non-native linux-aarch64 build
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.asset_name }}" == *.zip ]]; then
            7z a "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" gpg-inspector.exe
          else
            tar czf "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" gpg-inspector
          fi

      - name: Attach to release
        shell: bash
        run: gh release upload '${{ github.event.release.tag_name || inputs.tag }}' '${{ matrix.asset_name }}' --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    # Only on a real release; a manual dispatch is for binaries + formula.
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Publishes workspace crates in dependency order
      # (gpg-inspector-lib, then gpg-inspector), waiting for the index
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  bump-formula:
    name: Refresh the Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Check out the default branch for the current bump script (the release
      # tag may predate it); the script retags URLs and recomputes the shas.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Refresh the binary formula on the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jhheider/homebrew-tap.git" tap
          python3 .github/scripts/bump-tap-formula.py "$TAG" tap/Formula/gpg-inspector.rb
          cd tap
          if git diff --quiet; then
            echo "formula already at ${TAG}; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "gpg-inspector ${TAG#v}: refresh binary formula"
          git push
