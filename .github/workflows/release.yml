name: Release

# Fires when a GitHub Release is published. The full release ceremony:
#   gh release create vX.Y.Z --generate-notes
# (version must already be committed in Cargo.toml) — this builds the
# platform binaries, attaches them, and publishes both crates.
on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: gpg-inspector-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: gpg-inspector-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: gpg-inspector-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: gpg-inspector-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: gpg-inspector-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Installs the cross linker for the non-native linux-aarch64 build
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.asset_name }}" == *.zip ]]; then
            7z a "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" gpg-inspector.exe
          else
            tar czf "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" gpg-inspector
          fi

      - name: Attach to release
        shell: bash
        run: gh release upload '${{ github.event.release.tag_name }}' '${{ matrix.asset_name }}' --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Publishes workspace crates in dependency order
      # (gpg-inspector-lib, then gpg-inspector), waiting for the index
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
